name: Build Tauri — Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja (np. 2.4.1)'
        required: false
        default: '2.4.0'
  push:
    branches:
      - claude/kebab-mes-dashboard-BLmao
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './kebab_fixed/src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install
        working-directory: kebab_fixed

      - name: Install Tauri CLI
        run: npm install --save-dev @tauri-apps/cli@^2
        working-directory: kebab_fixed

      - name: Generate icons from app-icon.png
        run: npx tauri icon src-tauri/app-icon.png
        working-directory: kebab_fixed

      - name: Build Tauri (Windows NSIS)
        run: npx tauri build --target x86_64-pc-windows-msvc
        working-directory: kebab_fixed
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://204.168.166.34' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' kebab_fixed/src-tauri/Cargo.toml | head -1 | sed 's/version = "//' | sed 's/"//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: KebabMES-${{ steps.version.outputs.version }}-Windows-Setup
          path: kebab_fixed/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 90

      - name: Upload signature (.sig)
        uses: actions/upload-artifact@v4
        with:
          name: KebabMES-${{ steps.version.outputs.version }}-signature
          path: kebab_fixed/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
          if-no-files-found: warn
          retention-days: 90
