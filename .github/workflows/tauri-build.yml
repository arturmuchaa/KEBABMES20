name: Build Tauri — Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja (np. 2.4.1)'
        required: false
        default: ''
  push:
    branches:
      - claude/kebab-mes-dashboard-BLmao
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './kebab_fixed/src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install
        working-directory: kebab_fixed

      - name: Install Tauri CLI
        run: npm install --save-dev @tauri-apps/cli@^2
        working-directory: kebab_fixed

      - name: Generate icons from app-icon.png
        run: npx tauri icon src-tauri/app-icon.png
        working-directory: kebab_fixed

      - name: Build Tauri (Windows NSIS)
        run: npx tauri build --target x86_64-pc-windows-msvc
        working-directory: kebab_fixed
        env:
          # Hardcode — nginx MES nasłuchuje na :8080. Secret VITE_API_URL ignorujemy,
          # bo wcześniej był ustawiony bez portu i Tauri łapał pusty backend.
          VITE_API_URL: 'http://204.168.166.34:8080'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version and artifact paths
        id: meta
        shell: pwsh
        run: |
          $VERSION = (Select-String -Path "kebab_fixed/src-tauri/Cargo.toml" -Pattern '^version\s*=\s*"(.+)"').Matches[0].Groups[1].Value
          $BUNDLE = "kebab_fixed/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $EXE = Get-ChildItem "$BUNDLE/*.exe" | Select-Object -First 1
          $SIG = Get-ChildItem "$BUNDLE/*.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $SIGNATURE = if ($SIG) { (Get-Content $SIG.FullName -Raw).Trim() } else { "" }
          "version=$VERSION"          >> $env:GITHUB_OUTPUT
          "exe_path=$($EXE.FullName)" >> $env:GITHUB_OUTPUT
          "exe_name=$($EXE.Name)"     >> $env:GITHUB_OUTPUT
          "sig_path=$(if ($SIG) { $SIG.FullName } else { '' })" >> $env:GITHUB_OUTPUT
          "signature=$SIGNATURE"      >> $env:GITHUB_OUTPUT
          Write-Host "Version: $VERSION | EXE: $($EXE.Name) | SIG: $(if ($SIG) { $SIG.Name } else { 'BRAK!' })"
          # Pełna lista plików bundle nsis (do diagnostyki)
          Write-Host "Bundle contents:"
          Get-ChildItem $BUNDLE | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) B)" }

      - name: Publish installer to VPS updater
        # continue-on-error: porażka publikacji (np. zły token w sekrecie) NIE może
        # blokować uploadu artefaktu ani utworzenia GitHub Release poniżej.
        continue-on-error: true
        shell: pwsh
        env:
          KEBAB_UPDATER_PUBLISH_URL: ${{ secrets.KEBAB_UPDATER_PUBLISH_URL }}
          KEBAB_UPDATER_ADMIN_TOKEN: ${{ secrets.KEBAB_UPDATER_ADMIN_TOKEN }}
        run: |
          # URL publikacji ZAHARDKODOWANY (host:port jest jawny w VITE_API_URL/CSP).
          # Sekret KEBAB_UPDATER_PUBLISH_URL bywał zanieczyszczony niewidocznymi
          # znakami (zero-width / NBSP), których .Trim() NIE usuwa → curl: (3) Bad
          # hostname. Token czyścimy do samych drukowalnych znaków ASCII (ten sam
          # problem mógłby psuć nagłówek).
          $pub = 'http://204.168.166.34:8080/api/admin/desktop-updates/publish'
          $tok = ("$env:KEBAB_UPDATER_ADMIN_TOKEN" -replace '[^\x21-\x7e]', '')
          if ([string]::IsNullOrWhiteSpace($tok)) {
            Write-Host "KEBAB_UPDATER_ADMIN_TOKEN brak; pomijam publikację na VPS (artefakt i tak zostanie wgrany)."
            exit 0
          }

          $VERSION = "${{ steps.meta.outputs.version }}"
          $SIGNATURE = "${{ steps.meta.outputs.signature }}"
          $FILENAME = "${{ steps.meta.outputs.exe_name }}"
          $PUB_DATE = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ" -AsUTC)
          $NOTES = "Nowa wersja Kebab MES $VERSION"
          $URL = "${pub}?version=$([uri]::EscapeDataString($VERSION))&signature=$([uri]::EscapeDataString($SIGNATURE))&filename=$([uri]::EscapeDataString($FILENAME))&notes=$([uri]::EscapeDataString($NOTES))&pub_date=$([uri]::EscapeDataString($PUB_DATE))"
          Write-Host "Publikuję $FILENAME (v$VERSION) -> $pub"
          Write-Host "URL well-formed: $([uri]::IsWellFormedUriString($URL, [UriKind]::Absolute))"

          curl.exe --fail --silent --show-error `
            -k `
            -X POST `
            -H "X-Admin-Token: $tok" `
            -H "Content-Type: application/octet-stream" `
            --data-binary "@${{ steps.meta.outputs.exe_path }}" `
            "$URL"

      - name: Upload installer artifact (backup)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: KebabMES-${{ steps.meta.outputs.version }}-Windows-Setup
          path: |
            ${{ steps.meta.outputs.exe_path }}
            ${{ steps.meta.outputs.sig_path }}
          retention-days: 90

      - name: Create GitHub Release and upload installer (best effort)
        if: ${{ always() }}
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: Kebab MES v${{ steps.meta.outputs.version }}
          body: |
            ## Kebab MES v${{ steps.meta.outputs.version }}

            Instalator dla systemu Windows.

            **Instalacja:** Pobierz i uruchom plik `.exe`
            **Aktualizacja:** Aplikacja sprawdza aktualizacje automatycznie przy starcie
          files: |
            ${{ steps.meta.outputs.exe_path }}
            ${{ steps.meta.outputs.sig_path }}
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
