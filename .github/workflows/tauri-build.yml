name: Build Tauri — Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja (np. 2.4.0)'
        required: false
        default: '2.4.0'
  push:
    branches:
      - claude/kebab-mes-dashboard-BLmao
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './kebab_fixed/src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: kebab_fixed

      - name: Install Tauri CLI
        run: npm install --save-dev @tauri-apps/cli@^2
        working-directory: kebab_fixed

      - name: Generate icons from app-icon.png
        run: npx tauri icon src-tauri/app-icon.png
        working-directory: kebab_fixed

      - name: Build Tauri (Windows NSIS)
        run: npx tauri build --target x86_64-pc-windows-msvc
        working-directory: kebab_fixed
        env:
          VITE_API_URL: ''

      - name: Upload installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: KebabMES-${{ github.event.inputs.version || '2.4.0' }}-Windows-Setup
          path: kebab_fixed/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 90
