name: Build Tauri — Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja (np. 2.4.1)'
        required: false
        default: ''
  push:
    branches:
      - claude/kebab-mes-dashboard-BLmao
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './kebab_fixed/src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install
        working-directory: kebab_fixed

      - name: Install Tauri CLI
        run: npm install --save-dev @tauri-apps/cli@^2
        working-directory: kebab_fixed

      - name: Generate icons from app-icon.png
        run: npx tauri icon src-tauri/app-icon.png
        working-directory: kebab_fixed

      - name: Build Tauri (Windows NSIS)
        run: npx tauri build --target x86_64-pc-windows-msvc
        working-directory: kebab_fixed
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://204.168.166.34' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version and artifact paths
        id: meta
        shell: bash
        run: |
          VERSION=$(grep '^version' kebab_fixed/src-tauri/Cargo.toml | head -1 | sed 's/version = "//' | sed 's/"//')
          EXE=$(ls kebab_fixed/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe | head -1)
          SIG=$(ls kebab_fixed/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig 2>/dev/null | head -1)
          EXE_NAME=$(basename "$EXE")
          SIGNATURE=""
          if [ -n "$SIG" ]; then
            SIGNATURE=$(cat "$SIG")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "exe_path=$EXE" >> $GITHUB_OUTPUT
          echo "exe_name=$EXE_NAME" >> $GITHUB_OUTPUT
          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: Kebab MES v${{ steps.meta.outputs.version }}
          body: |
            ## Kebab MES v${{ steps.meta.outputs.version }}

            Instalator dla systemu Windows.

            **Instalacja:** Pobierz i uruchom plik `.exe`
            **Aktualizacja:** Aplikacja sprawdza aktualizacje automatycznie przy starcie
          files: ${{ steps.meta.outputs.exe_path }}
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest.json for auto-updater
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          EXE_NAME="${{ steps.meta.outputs.exe_name }}"
          SIGNATURE="${{ steps.meta.outputs.signature }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          URL="https://github.com/arturmuchaa/kebabmes20/releases/download/v${VERSION}/${EXE_NAME}"

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Nowa wersja Kebab MES ${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "${URL}"
              }
            }
          }
          EOF

          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add latest.json
          git diff --staged --quiet || git commit -m "chore: update latest.json to v${VERSION} [skip ci]"
          git push origin HEAD:main || git push origin HEAD:claude/kebab-mes-dashboard-BLmao

      - name: Upload installer artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: KebabMES-${{ steps.meta.outputs.version }}-Windows-Setup
          path: ${{ steps.meta.outputs.exe_path }}
          retention-days: 90
