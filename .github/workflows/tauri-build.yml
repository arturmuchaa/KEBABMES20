name: Build Tauri — Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja (np. 2.4.1)'
        required: false
        default: ''
  push:
    branches:
      - claude/kebab-mes-dashboard-BLmao
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './kebab_fixed/src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install
        working-directory: kebab_fixed

      - name: Install Tauri CLI
        run: npm install --save-dev @tauri-apps/cli@^2
        working-directory: kebab_fixed

      - name: Generate icons from app-icon.png
        run: npx tauri icon src-tauri/app-icon.png
        working-directory: kebab_fixed

      - name: Build Tauri (Windows NSIS)
        run: npx tauri build --target x86_64-pc-windows-msvc
        working-directory: kebab_fixed
        env:
          # Hardcode — nginx MES nasłuchuje na :8080. Secret VITE_API_URL ignorujemy,
          # bo wcześniej był ustawiony bez portu i Tauri łapał pusty backend.
          VITE_API_URL: 'http://204.168.166.34:8080'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version and artifact paths
        id: meta
        shell: pwsh
        run: |
          $VERSION = (Select-String -Path "kebab_fixed/src-tauri/Cargo.toml" -Pattern '^version\s*=\s*"(.+)"').Matches[0].Groups[1].Value
          $BUNDLE = "kebab_fixed/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $EXE = Get-ChildItem "$BUNDLE/*.exe" | Select-Object -First 1
          $SIG = Get-ChildItem "$BUNDLE/*.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $SIGNATURE = if ($SIG) { (Get-Content $SIG.FullName -Raw).Trim() } else { "" }
          "version=$VERSION"          >> $env:GITHUB_OUTPUT
          "exe_path=$($EXE.FullName)" >> $env:GITHUB_OUTPUT
          "exe_name=$($EXE.Name)"     >> $env:GITHUB_OUTPUT
          "sig_path=$(if ($SIG) { $SIG.FullName } else { '' })" >> $env:GITHUB_OUTPUT
          "signature=$SIGNATURE"      >> $env:GITHUB_OUTPUT
          Write-Host "Version: $VERSION | EXE: $($EXE.Name) | SIG: $(if ($SIG) { $SIG.Name } else { 'BRAK!' })"
          # Pełna lista plików bundle nsis (do diagnostyki)
          Write-Host "Bundle contents:"
          Get-ChildItem $BUNDLE | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) B)" }

      - name: Create GitHub Release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: Kebab MES v${{ steps.meta.outputs.version }}
          body: |
            ## Kebab MES v${{ steps.meta.outputs.version }}

            Instalator dla systemu Windows.

            **Instalacja:** Pobierz i uruchom plik `.exe`
            **Aktualizacja:** Aplikacja sprawdza aktualizacje automatycznie przy starcie
          files: |
            ${{ steps.meta.outputs.exe_path }}
            ${{ steps.meta.outputs.sig_path }}
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest.json for auto-updater
        shell: pwsh
        run: |
          $VERSION   = "${{ steps.meta.outputs.version }}"
          $EXE_NAME  = "${{ steps.meta.outputs.exe_name }}"
          $SIGNATURE = "${{ steps.meta.outputs.signature }}"
          $PUB_DATE  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ" -AsUTC)
          $URL       = "https://github.com/arturmuchaa/kebabmes20/releases/download/v${VERSION}/${EXE_NAME}"

          $json = @{
            version  = $VERSION
            notes    = "Nowa wersja Kebab MES $VERSION"
            pub_date = $PUB_DATE
            platforms = @{
              "windows-x86_64" = @{
                signature = $SIGNATURE
                url       = $URL
              }
            }
          } | ConvertTo-Json -Depth 5
          $json | Set-Content -Path "latest.json" -Encoding UTF8

          # Wrzucamy latest.json na branch main — tauri.conf.json wskazuje
          # endpoint .../main/latest.json. Wcześniej szło na claude/* przez
          # co auto-updater nigdy nie widział nowych wersji.
          Copy-Item latest.json -Destination "$env:RUNNER_TEMP/latest.json" -Force
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          # Wyrzucamy zmiany z builda (package-lock, generowane ikony itd) — i tak je nadpisze checkout main.
          git reset --hard HEAD
          git clean -fd
          git fetch origin main
          git checkout -B main origin/main
          Copy-Item "$env:RUNNER_TEMP/latest.json" -Destination latest.json -Force
          git add latest.json
          $diff = git diff --staged --name-only
          if ($diff) {
            git commit -m "chore: update latest.json to v${VERSION} [skip ci]"
            git push origin main
          }

      - name: Upload installer artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: KebabMES-${{ steps.meta.outputs.version }}-Windows-Setup
          path: ${{ steps.meta.outputs.exe_path }}
          retention-days: 90
