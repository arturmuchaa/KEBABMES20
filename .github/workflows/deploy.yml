name: Build Windows Installer — kebab_fixed

on:
  push:
    branches:
      - claude/redesign-admin-ui-mOZG9
      - main
      - master
    paths:
      - 'kebab_fixed/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API URL (e.g. http://1.2.3.4:8000)'
        required: false
        default: 'http://204.168.166.34'
      draft_release:
        description: 'Create draft GitHub Release?'
        type: boolean
        required: false
        default: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows NSIS Installer
    runs-on: windows-latest

    env:
      VITE_API_URL: ${{ github.event.inputs.api_url || 'http://204.168.166.34' }}

    steps:
      # ── 1. Source ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kebab_fixed/package-lock.json

      # ── 3. Rust ──────────────────────────────────────────────
      - name: Setup Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: kebab_fixed/src-tauri -> target

      # ── 4. Frontend deps ─────────────────────────────────────
      - name: Install npm dependencies
        working-directory: kebab_fixed
        run: npm ci

      # ── 5. App icons ─────────────────────────────────────────
      - name: Generate app icons (Tauri)
        working-directory: kebab_fixed
        shell: pwsh
        run: |
          pip install Pillow --quiet
          New-Item -ItemType Directory -Force -Path "src-tauri/icons" | Out-Null

          # Generate base 512x512 icon: dark blue bg + white ring
          python -c @"
          from PIL import Image, ImageDraw
          import os

          os.makedirs('src-tauri/icons', exist_ok=True)
          img = Image.new('RGBA', (512, 512), (15, 23, 42, 255))   # slate-900
          d = ImageDraw.Draw(img)
          # outer white ring
          d.ellipse([40, 40, 472, 472], fill=(255, 255, 255, 255))
          # inner blue fill
          d.ellipse([80, 80, 432, 432], fill=(59, 130, 246, 255))  # blue-500
          # center white dot
          d.ellipse([180, 180, 332, 332], fill=(255, 255, 255, 255))
          img.save('src-tauri/icons/icon.png')
          print('Icon generated: src-tauri/icons/icon.png')
          "@

          Write-Host "Running: npx tauri icon"
          npx tauri icon "src-tauri/icons/icon.png"
          Write-Host "Icons generated:"
          Get-ChildItem src-tauri/icons/

      # ── 6. Build Tauri installer ──────────────────────────────
      - name: Build Tauri — Windows NSIS installer
        working-directory: kebab_fixed
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npx tauri build

      # ── 7. Collect artifacts ──────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KebabMES-v2.2.0-build-${{ github.run_number }}
          path: |
            kebab_fixed/src-tauri/target/release/bundle/nsis/*.exe
            kebab_fixed/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 90
          if-no-files-found: error

      # ── 8. GitHub Release (draft) ─────────────────────────────
      - name: Create GitHub Release (draft)
        if: ${{ github.event_name == 'push' || github.event.inputs.draft_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.2.0-build-${{ github.run_number }}
          name: "Kebab MES v2.2.0 — build #${{ github.run_number }}"
          draft: true
          prerelease: false
          files: |
            kebab_fixed/src-tauri/target/release/bundle/nsis/*.exe
            kebab_fixed/src-tauri/target/release/bundle/msi/*.msi
          body: |
            ## Kebab MES v2.2.0 — Premium Dark UI

            ### Co nowego w tym buildzie
            - **Premium dark enterprise theme** (slate-950/900/800)
            - **Zwijany sidebar** (w-56 ↔ w-14) z ikonami i etykietami
            - **Topbar** ze statusem połączenia online/offline
            - **Loading skeletons** zamiast pustych ekranów
            - **Ciemne badge** (tinted) i karty w stylu enterprise
            - shadcn/ui + CVA + tailwind-merge + sonner
            - Wszystkie 18 stron biurowych odświeżone

            ### Jak zainstalować
            1. Pobierz **KebabMES_\*\_x64-setup.exe** poniżej
            2. Uruchom instalator (Dalej → Dalej → Zakończ)
            3. Uruchom **Kebab MES** z pulpitu lub menu Start
            4. Wpisz adres backendu: `${{ env.VITE_API_URL }}`

            ---
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Build: #${{ github.run_number }}
