name: Build Windows Installer — Kebab MES

on:
  push:
    branches:
      - claude/redesign-dashboard-ui-gNVuD
      - claude/add-traceability-system-UxumS
      - claude/redesign-admin-ui-mOZG9
      - main
      - master
    paths:
      - 'kebab_fixed/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API URL (np. http://204.168.166.34)'
        required: false
        default: 'http://204.168.166.34'
      version_suffix:
        description: 'Sufiks wersji (np. rc1, hotfix) — opcjonalny'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows NSIS Installer
    runs-on: windows-latest

    env:
      VITE_API_URL: ${{ github.event.inputs.api_url || 'http://204.168.166.34' }}
      APP_VERSION: '2.3.0'

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js 20 ────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Rust stable ───────────────────────────────────────
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: kebab_fixed/src-tauri -> target
          cache-on-failure: true

      # ── 4. npm install (legacy-peer-deps dla motion) ──────────
      - name: Install npm dependencies
        working-directory: kebab_fixed
        run: npm install --legacy-peer-deps

      # ── 5. Generuj ikonę aplikacji ───────────────────────────
      - name: Generate app icon
        working-directory: kebab_fixed
        shell: pwsh
        run: |
          pip install Pillow --quiet --disable-pip-version-check

          # Zapisz skrypt do pliku (unika problemów z wcięciami w heredoc)
          $py = @'
from PIL import Image, ImageDraw
import os
os.makedirs("src-tauri/icons", exist_ok=True)
size = 512
img = Image.new("RGBA", (size, size), (255, 255, 255, 0))
d = ImageDraw.Draw(img)
# Tło — niebieski okrąg
d.ellipse([4, 4, 508, 508], fill=(37, 99, 235, 255))
# Biały pierścień
d.ellipse([64, 64, 448, 448], fill=(255, 255, 255, 255))
# Wewnętrzny niebieski
d.ellipse([96, 96, 416, 416], fill=(37, 99, 235, 255))
# Biały środek
d.ellipse([196, 196, 316, 316], fill=(255, 255, 255, 255))
img.save("src-tauri/icons/icon.png")
print("Ikona wygenerowana: src-tauri/icons/icon.png")
'@
          $py | Out-File -FilePath "gen_icon.py" -Encoding utf8
          python gen_icon.py

          # Generuj wszystkie formaty (32x32, 128x128, .ico, .icns itp.)
          npx @tauri-apps/cli@^2 icon "src-tauri/icons/icon.png"

          Write-Host "Wygenerowane ikony:"
          Get-ChildItem src-tauri/icons/

      # ── 6. Build Tauri (tylko NSIS — najbardziej stabilny) ────
      - name: Build Tauri NSIS installer
        working-directory: kebab_fixed
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npx @tauri-apps/cli@^2 build --bundles nsis

      # ── 7. Upload artifact ───────────────────────────────────
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: KebabMES-v${{ env.APP_VERSION }}-build${{ github.run_number }}
          path: kebab_fixed/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 90
          if-no-files-found: error

      # ── 8. GitHub Release (draft) ────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-b${{ github.run_number }}${{ github.event.inputs.version_suffix && format('-{0}', github.event.inputs.version_suffix) || '' }}
          name: "Kebab MES v${{ env.APP_VERSION }} — build #${{ github.run_number }}"
          draft: true
          prerelease: false
          files: kebab_fixed/src-tauri/target/release/bundle/nsis/*.exe
          body: |
            ## Kebab MES v${{ env.APP_VERSION }}

            ### Jak zainstalować
            1. Pobierz `KebabMES_*_x64-setup.exe` poniżej
            2. Uruchom instalator → Dalej → Dalej → Zakończ
            3. Skrót na pulpicie: **Kebab MES**
            4. Backend API: `${{ env.VITE_API_URL }}`

            ### Wymagania
            - Windows 10 / 11 (x64)
            - Dostęp do serwera: `${{ env.VITE_API_URL }}`

            ---
            Branch: `${{ github.ref_name }}` | Build: #${{ github.run_number }} | Commit: `${{ github.sha }}`
