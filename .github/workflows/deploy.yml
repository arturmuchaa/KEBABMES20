name: Build

on:
  push:
    branches:
      - claude/add-traceability-system-UxumS

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kebab_fixed/package.json

      - name: Install dependencies
        working-directory: kebab_fixed
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: kebab_fixed
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: kebab_fixed/dist/
          retention-days: 7
