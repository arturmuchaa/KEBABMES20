name: Build Windows Installer — Kebab MES

on:
  push:
    branches:
      - claude/redesign-dashboard-ui-gNVuD
      - claude/add-traceability-system-UxumS
      - claude/redesign-admin-ui-mOZG9
      - main
      - master
    paths:
      - 'kebab_fixed/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API URL (np. http://204.168.166.34)'
        required: false
        default: 'http://204.168.166.34'
      version_suffix:
        description: 'Sufiks wersji (np. rc1, hotfix)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows NSIS Installer
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    env:
      VITE_API_URL: ${{ github.event.inputs.api_url || 'http://204.168.166.34' }}
      APP_VERSION: '2.3.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: kebab_fixed/src-tauri -> target
          cache-on-failure: true

      - name: Install npm dependencies
        working-directory: kebab_fixed
        run: npm install --legacy-peer-deps

      - name: Generate app icon
        working-directory: kebab_fixed
        run: |
          pip install Pillow --quiet --disable-pip-version-check
          python gen_icon.py
          npx "@tauri-apps/cli" icon src-tauri/icons/icon.png

      - name: Build Tauri NSIS installer
        working-directory: kebab_fixed
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npx "@tauri-apps/cli" build --bundles nsis

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KebabMES-v${{ env.APP_VERSION }}-build${{ github.run_number }}
          path: kebab_fixed/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: v${{ env.APP_VERSION }}-b${{ github.run_number }}
          name: "Kebab MES v${{ env.APP_VERSION }} — build #${{ github.run_number }}"
          draft: true
          files: kebab_fixed/src-tauri/target/release/bundle/nsis/*.exe
          body: |
            ## Kebab MES v${{ env.APP_VERSION }}

            ### Jak zainstalować
            1. Pobierz `KebabMES_*_x64-setup.exe` poniżej
            2. Uruchom instalator — Dalej — Zakończ
            3. Skrót na pulpicie: **Kebab MES**
            4. Backend API: `${{ env.VITE_API_URL }}`

            ### Wymagania
            - Windows 10 / 11 (x64)
            - Sieć do serwera: `${{ env.VITE_API_URL }}`

            ---
            Branch: `${{ github.ref_name }}` | Build: #${{ github.run_number }}
