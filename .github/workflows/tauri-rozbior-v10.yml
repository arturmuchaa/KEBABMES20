name: Build Tauri — Rozbiór HMI v10 (Windows)

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'rozbior-v10-*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './kebab_fixed/src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install
        working-directory: kebab_fixed

      - name: Install Tauri CLI
        run: npm install --save-dev @tauri-apps/cli@^2
        working-directory: kebab_fixed

      - name: Generate icons
        run: npx tauri icon src-tauri/app-icon.png
        working-directory: kebab_fixed

      - name: Build Tauri Rozbiór v10 (Windows NSIS, signed for silent auto-update)
        run: npx tauri build --target x86_64-pc-windows-msvc --config src-tauri/tauri.rozbior-v10.conf.json --features kiosk
        working-directory: kebab_fixed
        env:
          VITE_API_URL: 'http://204.168.166.34:8080'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get artifact info
        id: meta
        shell: pwsh
        run: |
          $VERSION = (Select-String -Path "kebab_fixed/src-tauri/tauri.rozbior-v10.conf.json" -Pattern '"version":\s*"(.+)"').Matches[0].Groups[1].Value
          $BUNDLE = "kebab_fixed/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $EXE = Get-ChildItem "$BUNDLE/*.exe" | Select-Object -First 1
          $SIG = Get-ChildItem "$BUNDLE/*.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          # UWAGA: nie przepuszczamy treści .sig (wieloliniowa) przez $GITHUB_OUTPUT —
          # prosta składnia "key=value" psuje się na wartościach z osadzonymi
          # nowymi liniami (GitHub Actions wymaga do tego osobnej składni z
          # delimiterem). Zamiast tego przekazujemy tylko sig_path (bezpieczna,
          # jednoliniowa ścieżka) i odczytujemy treść podpisu na nowo w kroku
          # publikacji, na tym samym runnerze, gdzie plik nadal istnieje.
          "version=$VERSION"          >> $env:GITHUB_OUTPUT
          "exe_path=$($EXE.FullName)" >> $env:GITHUB_OUTPUT
          "exe_name=$($EXE.Name)"     >> $env:GITHUB_OUTPUT
          "sig_path=$(if ($SIG) { $SIG.FullName } else { '' })" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $VERSION | EXE: $($EXE.Name) ($([math]::Round($EXE.Length/1MB, 1)) MB) | SIG: $(if ($SIG) { $SIG.Name } else { 'BRAK!' })"

      - name: Publish installer to VPS silent-updater (rozbior-v10 channel)
        # continue-on-error: porażka publikacji (np. zły token w sekrecie) NIE może
        # blokować uploadu artefaktu ani utworzenia GitHub Release poniżej.
        continue-on-error: true
        shell: pwsh
        env:
          KEBAB_UPDATER_ADMIN_TOKEN: ${{ secrets.KEBAB_UPDATER_ADMIN_TOKEN }}
        run: |
          $pub = 'http://204.168.166.34:8080/api/admin/desktop-updates/rozbior-v10/publish'
          $tok = ("$env:KEBAB_UPDATER_ADMIN_TOKEN" -replace '[^\x21-\x7e]', '')
          if ([string]::IsNullOrWhiteSpace($tok)) {
            Write-Host "KEBAB_UPDATER_ADMIN_TOKEN brak; pomijam publikację cichej aktualizacji (artefakt i tak zostanie wgrany do GitHub Release)."
            exit 0
          }

          $sigPath = "${{ steps.meta.outputs.sig_path }}"
          if ([string]::IsNullOrWhiteSpace($sigPath) -or -not (Test-Path $sigPath)) {
            Write-Host "Brak pliku .sig (sekrety TAURI_SIGNING_* nieustawione?) — pomijam publikację, kiosk nie zweryfikowałby niepodpisanej aktualizacji."
            exit 0
          }
          # Odczyt TREŚCI podpisu na nowo z pliku (nie z $GITHUB_OUTPUT) — patrz
          # komentarz w kroku "Get artifact info" o wieloliniowych wartościach.
          $SIGNATURE = (Get-Content $sigPath -Raw).Trim()

          $VERSION = "${{ steps.meta.outputs.version }}"
          $FILENAME = "${{ steps.meta.outputs.exe_name }}"
          $EXE_PATH = "${{ steps.meta.outputs.exe_path }}"
          $PUB_DATE = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ" -AsUTC)
          $NOTES = "HMI v10 $VERSION"
          $URL = "$pub?version=$([uri]::EscapeDataString($VERSION))&signature=$([uri]::EscapeDataString($SIGNATURE))&filename=$([uri]::EscapeDataString($FILENAME))&notes=$([uri]::EscapeDataString($NOTES))&pub_date=$([uri]::EscapeDataString($PUB_DATE))"

          Write-Host "Publikuję $FILENAME (v$VERSION) -> $pub"

          # 1.0.12 obalił poprzednią hipotezę: [uri]::IsWellFormedUriString($URL)
          # zwróciło False i Invoke-RestMethod (natywny .NET, nie curl.exe) padł
          # z "Invalid URI: The hostname could not be parsed" — więc $URL jest
          # NAPRAWDĘ źle sformowany, to nie kwestia przekazywania argv do curl.
          # Bisekcja budowy query-stringu krok po kroku, żeby namierzyć KTÓRY
          # parametr psuje parsowanie hosta (dziwne samo w sobie — host jest na
          # samym początku stringa, więc coś dalej musi wpływać na to jak .NET
          # go interpretuje, albo $pub nie jest tym, czym się wydaje).
          $qVersion  = "$pub?version=$([uri]::EscapeDataString($VERSION))"
          $qSig      = "$qVersion&signature=$([uri]::EscapeDataString($SIGNATURE))"
          $qFilename = "$qSig&filename=$([uri]::EscapeDataString($FILENAME))"
          $qNotes    = "$qFilename&notes=$([uri]::EscapeDataString($NOTES))"

          Write-Host "=== BISEKCJA URI ==="
          # 1.0.13 namierzył: $pub SAM jest wellformed=True, ALE $pub+"?version=..."
          # juz jest False — mimo ze oczekiwana wartosc to zwykly, prosty ciag
          # "http://204.168.166.34:8080/.../publish?version=1.0.13" ktory manualnie
          # (Python urllib.parse.quote) wyglada calkowicie poprawnie. Wiec albo w
          # $qVersion jest jakis niewidoczny znak, albo EscapeDataString($VERSION)
          # nie zwraca tego czego sie spodziewamy. Zrzucamy SUROWA wartosc w
          # jawnych znacznikach <<< >>> zeby to zobaczyc na wlasne oczy, plus
          # dlugosc i evVersion (wynik samego EscapeDataString) osobno, PRZED
          # konkatenacja z $pub.
          $evVersion = [uri]::EscapeDataString($VERSION)
          Write-Host "VERSION raw:    <<<$VERSION>>> (len=$($VERSION.Length))"
          Write-Host "EscapeDataString(VERSION): <<<$evVersion>>> (len=$($evVersion.Length))"
          Write-Host "qVersion raw:   <<<$qVersion>>> (len=$($qVersion.Length))"
          Write-Host "pub sam:        [$pub] wellformed=$([uri]::IsWellFormedUriString($pub, [UriKind]::Absolute))"
          Write-Host "pub+version:    wellformed=$([uri]::IsWellFormedUriString($qVersion, [UriKind]::Absolute))"
          Write-Host "  +signature:   wellformed=$([uri]::IsWellFormedUriString($qSig, [UriKind]::Absolute)) (len=$($qSig.Length))"
          Write-Host "  +filename:    wellformed=$([uri]::IsWellFormedUriString($qFilename, [UriKind]::Absolute))"
          Write-Host "  +notes:       wellformed=$([uri]::IsWellFormedUriString($qNotes, [UriKind]::Absolute))"
          Write-Host "  +pub_date(URL):wellformed=$([uri]::IsWellFormedUriString($URL, [UriKind]::Absolute))"
          # Rzeczywista próba budowy System.Uri na każdym kroku, TERAZ z jawnym
          # UriKind.Absolute (nie domyślnym RelativeOrAbsolute — "format nie mógł
          # być określony" pasuje do porażki TEGO WŁAŚNIE heurystycznego
          # rozpoznawania w konstruktorze 1-argumentowym).
          foreach ($pair in @(@('pub',$pub), @('version',$qVersion), @('signature',$qSig), @('filename',$qFilename), @('notes',$qNotes), @('pub_date/URL',$URL))) {
            try {
              [void][System.Uri]::new($pair[1])
              Write-Host "  [$($pair[0])] Uri.new(1-arg) OK"
            } catch {
              Write-Host "  [$($pair[0])] Uri.new(1-arg) BLAD: $($_.Exception.Message)"
            }
            try {
              [void][System.Uri]::new($pair[1], [UriKind]::Absolute)
              Write-Host "  [$($pair[0])] Uri.new(Absolute) OK"
            } catch {
              Write-Host "  [$($pair[0])] Uri.new(Absolute) BLAD: $($_.Exception.Message)"
            }
          }

          try {
            $resp = Invoke-RestMethod -Uri $URL -Method Post -Headers @{ 'X-Admin-Token' = $tok } -InFile $EXE_PATH -ContentType 'application/octet-stream'
            Write-Host "Publikacja OK: $($resp | ConvertTo-Json -Compress -Depth 5)"
          } catch {
            Write-Host "##[error]Publikacja nie powiodla sie: $($_.Exception.Message)"
            if ($_.ErrorDetails) { Write-Host "Szczegoly: $($_.ErrorDetails.Message)" }
            exit 1
          }

      - name: Upload installer artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: RozborHMI-v10-Windows-Setup
          path: |
            ${{ steps.meta.outputs.exe_path }}
            ${{ steps.meta.outputs.sig_path }}
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Rozbiór HMI v10 — ${{ github.ref_name }}
          body: |
            ## Rozbiór HMI v10 — biel + akcent indygo — Windows

            Standalone aplikacja dla panelu PC 21.5" (Windows).

            **Interfejs:** HMI v10 — biel + akcent indygo, czysty minimalny układ 3-kolumnowy.
            **Brak przełącznika wersji** — tylko panel rozbioru, nic więcej.
            **Fullscreen** — startuje w pełnym ekranie bez paska Windows.
            **Blokady:** F5, F12, Alt+F4, menu kontekstowe zablokowane.
            **Backend:** łączy się z http://204.168.166.34:8080
            **Auto-update:** kiosk sam sprawdza i instaluje nowe wersje w tle, co godzinę,
            bez żadnego pytania — nie trzeba mieć fizycznego dostępu do komputera panelowego,
            żeby zaktualizować (o ile ten build ma poprawny podpis — patrz krok "Publish"
            w logu tego workflow).

            **Instalacja (tylko za pierwszym razem):** uruchom `.exe` jako Administrator
            na komputerze panelowym. Kolejne wersje instalują się same.
          files: |
            ${{ steps.meta.outputs.exe_path }}
            ${{ steps.meta.outputs.sig_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
