name: Build & Release Desktop App

on:
  push:
    branches:
      - claude/add-traceability-system-UxumS
    paths:
      - 'kebab-mes-desktop/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer (NSIS)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: kebab-mes-desktop/src-tauri -> target

      - name: Install npm dependencies
        working-directory: kebab-mes-desktop
        run: npm install

      - name: Build frontend
        working-directory: kebab-mes-desktop
        run: npm run build

      - name: Build Tauri
        working-directory: kebab-mes-desktop
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload installer (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: KebabMES-Windows-Installer
          path: kebab-mes-desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-build-${{ github.run_number }}
          name: "Kebab MES Desktop — build #${{ github.run_number }}"
          draft: true
          prerelease: false
          files: kebab-mes-desktop/src-tauri/target/release/bundle/nsis/*.exe
          body: |
            ## Kebab MES — Aplikacja desktopowa (Windows)

            ### Jak zainstalować
            1. Pobierz plik **KebabMES_*_x64-setup.exe** poniżej
            2. Uruchom instalator → Dalej → Dalej → Zakończ
            3. Uruchom **Kebab MES** z pulpitu lub menu Start
            4. Przy pierwszym uruchomieniu wpisz adres VPS: `http://TWOJE_IP:8000`

            ---
            Commit: ${{ github.sha }}
