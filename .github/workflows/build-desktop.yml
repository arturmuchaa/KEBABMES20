name: Build & Release Desktop App

on:
  push:
    branches:
      - claude/add-traceability-system-UxumS
    paths:
      - 'kebab-mes-desktop/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer (NSIS)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kebab-mes-desktop/package-lock.json

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: kebab-mes-desktop/src-tauri -> target

      - name: Install npm dependencies
        working-directory: kebab-mes-desktop
        run: npm ci

      - name: Build Tauri (NSIS installer)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: kebab-mes-desktop
          tagName: desktop-build-${{ github.run_number }}
          releaseName: "Kebab MES Desktop — build #${{ github.run_number }}"
          releaseBody: |
            ## Kebab MES — Aplikacja desktopowa (Windows)

            ### Jak zainstalować
            1. Pobierz plik **KebabMES_*_x64-setup.exe** poniżej
            2. Uruchom instalator i kliknij Dalej → Dalej → Zakończ
            3. Uruchom **Kebab MES** z pulpitu lub menu Start
            4. Przy pierwszym uruchomieniu wpisz adres VPS: `http://TWOJE_IP:8000`

            ---
            Commit: ${{ github.sha }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: KebabMES-Windows-setup
          path: kebab-mes-desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: error
