<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1d4ed8" />
    <title>Kebab MES</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />

    <!-- PWA / iOS "Dodaj do ekranu początkowego"
         Manifest, ikona i tytuł są tworzone DYNAMICZNIE w tym skrypcie
         (nie statycznie w HTML) — iOS Safari ma wtedy TYLKO jeden manifest
         dostępny od momentu parsowania, więc nie ma race condition gdzie
         przeglądarka załapie default manifest z HTML zanim React go zmieni. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <script>
      (function () {
        var path = window.location.pathname || '/';
        // Default = generic Kebab MES (gdy user nie jest na stronie-PWA)
        var cfg = { manifest: '/manifest-rozbior.json', icon: '/icons/apple-touch-icon-180.png', title: 'Kebab MES', docTitle: 'Kebab MES' };
        if (path === '/mobile' || path.indexOf('/mobile/') === 0 || path.indexOf('/m/') === 0) {
          cfg = { manifest: '/manifest-skaner.json', icon: '/icons/skaner-apple-touch-icon-180.png', title: 'Skaner QR', docTitle: 'Skaner QR — Kebab MES' };
        } else if (path === '/tablet/rozbior') {
          cfg = { manifest: '/manifest-rozbior.json', icon: '/icons/apple-touch-icon-180.png', title: 'Rozbiór', docTitle: 'Rozbiór — Kebab MES' };
        }

        // Tworzymy element dynamicznie — iOS NIE widzi żadnego rel='manifest'
        // przed wykonaniem tego skryptu, więc nie cache'uje 'błędnego'.
        function add(tag, attrs) {
          var el = document.createElement(tag);
          for (var k in attrs) el.setAttribute(k, attrs[k]);
          document.head.appendChild(el);
          return el;
        }
        add('link', { id: 'kebab-manifest', rel: 'manifest', href: cfg.manifest });
        add('link', { id: 'kebab-apple-icon', rel: 'apple-touch-icon', sizes: '180x180', href: cfg.icon });
        add('meta', { id: 'kebab-apple-title', name: 'apple-mobile-web-app-title', content: cfg.title });
        document.title = cfg.docTitle;
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
